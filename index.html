<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B2E4F" />

    <!-- Primary SEO meta -->
    <title>AYUSH Evidence Portal | India's Evidence-Based AYUSH Research</title>
    <meta
      name="description"
      content="Search credible, evidence-based research on AYUSH medicines, herbs, treatments, diseases and clinical trials. A Government of India research discovery platform for Ayurveda, Yoga & Naturopathy, Unani, Siddha and Homoeopathy."
    />
    <meta name="keywords" content="AYUSH, Ayurveda, Homoeopathy, Unani, Siddha, Yoga, evidence-based medicine, clinical trials, research, herbs, India" />
    <meta name="author" content="Ministry of AYUSH, Government of India" />
    <link rel="canonical" href="https://ayush-evidence.gov.in/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AYUSH Evidence Portal | India's Evidence-Based AYUSH Research" />
    <meta property="og:description" content="Is there credible research for this herb, medicine or treatment? Search evidence-graded AYUSH research and clinical trials." />
    <meta property="og:site_name" content="AYUSH Evidence Portal" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />

    <!-- Structured data for search engines -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "GovernmentOrganization",
        "name": "AYUSH Evidence Portal",
        "url": "https://ayush-evidence.gov.in",
        "parentOrganization": "Ministry of AYUSH, Government of India"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
